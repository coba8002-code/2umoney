# Render.com 배포 예시 (Docker). Railway/Fly.io 등도 Dockerfile 로 동일하게 배포 가능.
services:
  - type: web
    name: a11y-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard # Chromium 구동을 위해 메모리 여유가 있는 플랜 권장
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "3001"
      # 이미지 비전 LLM(/v1/alt)을 서버에서 쓰려면 Render 대시보드에서 값 입력(코드엔 저장 안 함).
      # 미설정 시 /v1/alt 는 네트워크 없는 결정론 폴백으로 동작한다.
      - key: ANTHROPIC_API_KEY
        sync: false
